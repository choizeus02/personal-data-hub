apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-frontend
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-frontend
  template:
    metadata:
      labels:
        app: trading-frontend
    spec:
      containers:
        - name: trading-frontend
          image: ghcr.io/choizeus02/personal-data-hub-frontend:699fd9f8aaec0a6692dc0e3925cf513e43dae390
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: trading-frontend
  namespace: trading
spec:
  type: ClusterIP
  selector:
    app: trading-frontend
  ports:
    - port: 80
      targetPort: 80
