apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: trading
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: prefect-worker
  template:
    metadata:
      labels:
        app: prefect-worker
    spec:
      containers:
        - name: prefect-worker
          image: ghcr.io/choizeus02/personal-data-hub:a59bea19964b7ab7583023fff325ac1ca1baa100
          command: ["prefect", "worker", "start", "--pool", "personal-data-hub-pool"]
          envFrom:
            - secretRef:
                name: personal-data-hub-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
