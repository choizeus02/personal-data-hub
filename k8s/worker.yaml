apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: trading
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: prefect-worker
  template:
    metadata:
      labels:
        app: prefect-worker
    spec:
      containers:
        - name: prefect-worker
          image: ghcr.io/choizeus02/personal-data-hub:85d854d0eb64727ec569263ae9b1a5d477c85fda
          command: ["/app/start-worker.sh"]
          envFrom:
            - secretRef:
                name: personal-data-hub-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
