name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "k8s/**"  # 매니페스트 변경은 빌드 트리거 안 함

jobs:
  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            worker:
              - 'flows/**'
              - 'Dockerfile'
              - 'requirements.txt'
              - 'prefect.yaml'

      - name: Log in to GHCR
        if: steps.changed.outputs.worker == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changed.outputs.worker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push worker image
        if: steps.changed.outputs.worker == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update image tag in worker.yaml
        if: steps.changed.outputs.worker == 'true'
        run: |
          sed -i "s|image: ghcr.io/.*personal-data-hub:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" k8s/worker.yaml

      - name: Commit updated manifest
        if: steps.changed.outputs.worker == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/worker.yaml
          git diff --staged --quiet || git commit -m "ci: update worker image tag to ${{ github.sha }}"
          git pull --rebase origin main
          git push

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'

      - name: Log in to GHCR
        if: steps.changed.outputs.api == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changed.outputs.api == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: steps.changed.outputs.api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}

      - name: Update image tag in api.yaml
        if: steps.changed.outputs.api == 'true'
        run: |
          sed -i "s|image: ghcr.io/.*personal-data-hub-api:.*|image: ghcr.io/${{ github.repository }}-api:${{ github.sha }}|" k8s/api.yaml

      - name: Commit updated manifest
        if: steps.changed.outputs.api == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api.yaml
          git diff --staged --quiet || git commit -m "ci: update api image tag to ${{ github.sha }}"
          git pull --rebase origin main
          git push

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Log in to GHCR
        if: steps.changed.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changed.outputs.frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        if: steps.changed.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}

      - name: Update image tag in frontend.yaml
        if: steps.changed.outputs.frontend == 'true'
        run: |
          sed -i "s|image: ghcr.io/.*personal-data-hub-frontend:.*|image: ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}|" k8s/frontend.yaml

      - name: Commit updated manifest
        if: steps.changed.outputs.frontend == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update frontend image tag to ${{ github.sha }}"
          git pull --rebase origin main
          git push
