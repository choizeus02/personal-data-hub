name: personal-data-hub
prefect-version: 3.0.0

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:
  - name: micro-batch-kospi
    entrypoint: flows/kospi/ingestion.py:micro_batch_flow
    work_pool:
      name: personal-data-hub-pool
    schedules:
      - cron: "* 9-15 * * 1-5"
        timezone: Asia/Seoul

  - name: backfill-kospi
    entrypoint: flows/kospi/ingestion.py:backfill_flow
    work_pool:
      name: personal-data-hub-pool
    # 스케줄 없음 — 수동 실행 전용

  - name: micro-batch-nasdaq
    entrypoint: flows/nasdaq/ingestion.py:micro_batch_flow
    work_pool:
      name: personal-data-hub-pool
    schedules:
      - cron: "* 14-20 * * 1-5"
        timezone: UTC
        # 서머타임(EDT) 기간(3~11월)에는 실제 장이 13:30~20:00 UTC
        # 보수적으로 14-20 설정 (서머타임 기간 장 시작 30분 늦게 수집 시작)

  - name: backfill-nasdaq
    entrypoint: flows/nasdaq/ingestion.py:backfill_flow
    work_pool:
      name: personal-data-hub-pool
    # 스케줄 없음 — 수동 실행 전용

  - name: eod-sync-nasdaq
    entrypoint: flows/nasdaq/ingestion.py:eod_sync_flow
    work_pool:
      name: personal-data-hub-pool
    schedules:
      - cron: "35 21 * * 1-5"
        timezone: UTC
        # 21:35 UTC = 4:35 PM EST / 5:35 PM EDT — 항상 장 마감 후
